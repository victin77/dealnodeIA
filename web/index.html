<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <link rel="icon" type="image/png" href="/logo-dark.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#161616" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="DealNote" />
    <script src="https://accounts.google.com/gsi/client" async></script>
    <title>DealNote AI — Copiloto de fechamento de vendas</title>
    <script>
      // Aplica o tema salvo antes da renderização (evita "flash" claro).
      try {
        if (localStorage.getItem("dealnote_theme") === "dark") {
          document.documentElement.classList.add("dark");
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
